<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
#erd { padding: 1rem 0; overflow-x: auto; }
</style>
<h2 class="sr-only">Schéma relationnel de la base Gestion Hospitalière : six tables (patients, consultations, medecins, medicaments, prescriptions, hospitalisations) reliées par des clés étrangères.</h2>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const src = `erDiagram
  MEDECINS ||--o{ PATIENTS : "suit"
  MEDECINS ||--o{ CONSULTATIONS : "réalise"
  PATIENTS ||--o{ CONSULTATIONS : "passe"
  PATIENTS ||--o{ HOSPITALISATIONS : "subit"
  CONSULTATIONS ||--o{ PRESCRIPTIONS : "génère"
  MEDICAMENTS ||--o{ PRESCRIPTIONS : "figure dans"
  PATIENTS {
    INTEGER id_patient PK
    VARCHAR nom
    VARCHAR prenom
    INTEGER age
    CHAR sexe
    VARCHAR groupe_sanguin
    VARCHAR service
    DATE date_admission
    INTEGER medecin_id FK
    VARCHAR statut
  }
  CONSULTATIONS {
    INTEGER id_consultation PK
    INTEGER id_patient FK
    DATE date_consultation
    VARCHAR diagnostic
    VARCHAR traitement
    INTEGER medecin_id FK
    INTEGER duree_min
  }
  MEDECINS {
    INTEGER id_medecin PK
    VARCHAR nom
    VARCHAR specialite
    VARCHAR service
    DECIMAL salaire
  }
  MEDICAMENTS {
    INTEGER id_medicament PK
    VARCHAR nom_medicament
    VARCHAR categorie
    DECIMAL prix_unitaire
  }
  PRESCRIPTIONS {
    INTEGER id_prescription PK
    INTEGER id_consultation FK
    INTEGER id_medicament FK
    INTEGER quantite
    INTEGER duree_jours
  }
  HOSPITALISATIONS {
    INTEGER id_hosp PK
    INTEGER id_patient FK
    DATE date_entree
    DATE date_sortie
    VARCHAR chambre
    DECIMAL cout_journalier
  }`;
const { svg } = await mermaid.render('erd-svg', src);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
